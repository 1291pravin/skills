name: Release Preview Themes

on:
  push:
    branches:
      - "release/**"

permissions:
  contents: read

jobs:
  deploy-release-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Extract version from branch
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Deploy release preview to all stores
        env:
          SHOPIFY_STORES_JSON: ${{ secrets.SHOPIFY_STORES_JSON }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          THEME_NAME="release-preview-$VERSION"
          echo "Deploying release preview: $THEME_NAME"

          RESULTS=""

          echo "$SHOPIFY_STORES_JSON" | jq -c '.[]' | while read -r store; do
            STORE_NAME=$(echo "$store" | jq -r '.name')
            STORE_URL=$(echo "$store" | jq -r '.url')
            STORE_TOKEN=$(echo "$store" | jq -r '.token')

            echo ""
            echo "=== $STORE_NAME ($STORE_URL) ==="

            # Check if release preview already exists
            EXISTING_ID=$(curl -s \
              "https://$STORE_URL/admin/api/2024-01/themes.json" \
              -H "X-Shopify-Access-Token: $STORE_TOKEN" \
              | jq -r ".themes[] | select(.name == \"$THEME_NAME\") | .id")

            if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
              echo "Updating existing release preview (ID: $EXISTING_ID)..."
              shopify theme push \
                --store="$STORE_URL" \
                --password="$STORE_TOKEN" \
                --theme="$EXISTING_ID" \
                --ignore=config/settings_data.json
            else
              echo "Creating new release preview..."
              shopify theme push \
                --store="$STORE_URL" \
                --password="$STORE_TOKEN" \
                --unpublished \
                --theme="$THEME_NAME" \
                --ignore=config/settings_data.json
            fi

            if [ $? -eq 0 ]; then
              echo "✓ $STORE_NAME — release preview deployed"
            else
              echo "✗ $STORE_NAME — release preview failed"
            fi
          done
