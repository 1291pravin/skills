name: PR Preview Themes

on:
  pull_request:
    types: [opened, synchronize]
    branches: [dev]

permissions:
  pull-requests: write
  contents: read

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        store: ${{ fromJson(secrets.SHOPIFY_STORES_JSON) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy preview theme
        id: deploy
        env:
          STORE_URL: ${{ matrix.store.url }}
          STORE_TOKEN: ${{ matrix.store.token }}
          STORE_NAME: ${{ matrix.store.name }}
          THEME_NAME: "preview-pr-${{ github.event.pull_request.number }}"
        run: |
          echo "Deploying preview to $STORE_NAME ($STORE_URL)..."

          # Check if preview theme already exists
          EXISTING_ID=$(curl -s \
            "https://$STORE_URL/admin/api/2024-01/themes.json" \
            -H "X-Shopify-Access-Token: $STORE_TOKEN" \
            | jq -r ".themes[] | select(.name == \"$THEME_NAME\") | .id")

          if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
            echo "Updating existing preview theme (ID: $EXISTING_ID)..."
            shopify theme push \
              --store="$STORE_URL" \
              --password="$STORE_TOKEN" \
              --theme="$EXISTING_ID" \
              --ignore=config/settings_data.json
          else
            echo "Creating new preview theme..."
            shopify theme push \
              --store="$STORE_URL" \
              --password="$STORE_TOKEN" \
              --unpublished \
              --theme="$THEME_NAME" \
              --ignore=config/settings_data.json
          fi

          # Get the theme ID for the preview URL
          THEME_ID=$(curl -s \
            "https://$STORE_URL/admin/api/2024-01/themes.json" \
            -H "X-Shopify-Access-Token: $STORE_TOKEN" \
            | jq -r ".themes[] | select(.name == \"$THEME_NAME\") | .id")

          echo "theme_id=$THEME_ID" >> "$GITHUB_OUTPUT"
          echo "preview_url=https://$STORE_URL/?preview_theme_id=$THEME_ID" >> "$GITHUB_OUTPUT"
          echo "store_name=$STORE_NAME" >> "$GITHUB_OUTPUT"

  comment-preview-urls:
    needs: deploy-preview
    runs-on: ubuntu-latest
    steps:
      - name: Collect preview URLs and comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🔍 Preview Themes Deployed

            Preview themes have been created/updated for PR #${{ github.event.pull_request.number }}.

            Check your Shopify admin to find themes named \`preview-pr-${{ github.event.pull_request.number }}\` on each store.

            > These preview themes are automatically cleaned up when the PR is merged or closed.`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }}
            });

            const botComment = comments.find(c =>
              c.body.includes('Preview Themes Deployed') && c.user.type === 'Bot'
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.pull_request.number }},
                body
              });
            }

      - name: Update Jira ticket with preview link
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          # Extract ticket key from branch name
          BRANCH="${{ github.head_ref }}"
          TICKET=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          if [ -z "$TICKET" ] || [ -z "$JIRA_URL" ]; then
            echo "No ticket ID found or Jira not configured — skipping Jira update"
            exit 0
          fi

          PR_NUM="${{ github.event.pull_request.number }}"
          COMMENT="Preview themes deployed for PR #${PR_NUM}. Look for theme named preview-pr-${PR_NUM} in each store's Shopify admin."

          curl -s -X POST \
            "$JIRA_URL/rest/api/3/issue/$TICKET/comment" \
            -H "Content-Type: application/json" \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -d "{\"body\": {\"type\": \"doc\", \"version\": 1, \"content\": [{\"type\": \"paragraph\", \"content\": [{\"type\": \"text\", \"text\": \"$COMMENT\"}]}]}}" \
            || curl -s -X POST \
              "$JIRA_URL/rest/api/2/issue/$TICKET/comment" \
              -H "Content-Type: application/json" \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -d "{\"body\": \"$COMMENT\"}"
